name: CD - Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (git SHA short, e.g. abc1234). Leave blank to use latest-staging."
        required: false
        default: ""
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: nemoclaw
  ECS_CLUSTER: nemoclaw-production
  ECS_SERVICE: nemoclaw-production-svc
  ECS_TASK_FAMILY: nemoclaw-production
  CONTAINER_NAME: nemoclaw

jobs:
  safety-check:
    name: Safety Check
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "❌ Confirmation not provided. You must type 'deploy' to proceed."
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: safety-check
    environment: production   # Requires GitHub Environment protection rules + approvers
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image URI
        id: resolve-image
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="latest-staging"
            echo "⚠️  No tag specified — using latest-staging"
          fi
          echo "image=${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Re-tag image as production
        run: |
          docker pull "${{ steps.resolve-image.outputs.image }}"
          docker tag "${{ steps.resolve-image.outputs.image }}" \
            "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:production-${{ steps.resolve-image.outputs.tag }}"
          docker tag "${{ steps.resolve-image.outputs.image }}" \
            "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest-production"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:production-${{ steps.resolve-image.outputs.tag }}"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest-production"

      - name: Download current production task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition > task-definition.json

      - name: Render updated task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.resolve-image.outputs.image }}

      - name: Deploy to ECS Production (blue/green via ECS rolling)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Post-deploy smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names nemoclaw-production-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          ./scripts/smoke-test.sh "http://${ALB_DNS}" 60

      - name: Tag deployment in Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "production-${{ steps.resolve-image.outputs.tag }}-$(date +%Y%m%d%H%M)"
          git push --tags

      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚀 NemoClaw PRODUCTION deploy succeeded\nImage: `${{ steps.resolve-image.outputs.tag }}`\nDeployed by: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🔥 NemoClaw PRODUCTION deploy FAILED\nImage: `${{ steps.resolve-image.outputs.tag }}`\nDeployed by: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
